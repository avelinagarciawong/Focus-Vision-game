<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Point - Privacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/privacy.css">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <img src="icon/logo.png" alt="Focus Point Logo" class="main-logo">
        </div>
        <nav class="nav-menu">
            <a href="home.html">Home</a>
            <a href="#">About Us</a>
            <a href="#">How to use</a>
        </nav>
        <div class="top-user-icon">
            <img src="icon/profileA.png" alt="User Icon">
        </div>
    </header>

    <main class="content-wrapper">
        <aside class="sidebar">
            <div class="side-item">
                <a href="profile.html">
                    <img src="icon/profil.png" alt="Profile">
                </a>
            </div>
            <div class="side-item">
                <a href="notification.html">
                    <img src="icon/notif.png" alt="Notification">
                </a>
            </div>
            <div class="side-item active">
                <a href="privacy.html">
                    <img src="icon/privacy.png" alt="Security">
                </a>
            </div>
        </aside>

        <section class="privacy-card">
        <div class="card-header">
            <h1>Change password</h1>
        </div>

        <form class="privacy-form">
            <div class="input-grid">
                    <div class="input-stack">
                <div class="input-group full-width">
                    <label>Current password</label>
                    <input type="password">
                </div>
                <div class="input-group full-width">
                    <label>New password</label>
                    <input type="password">
                </div>
                <div class="input-group full-width">
                    <label>Re-type new password</label>
                    <input type="password">
                </div>
            </div>
                </div>
            
            <div class="form-action">
                <button type="submit" class="save-btn">Save Changes</button>
            </div>
            
            
        </form>
    </section>
    </main>

</body>
</html>
