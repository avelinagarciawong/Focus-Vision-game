<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brodie String</title>
<link rel="stylesheet" href="css/playgame.css">
<style>
    #webcam-feed {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        border-radius: 12px;
    }
    .game-area {
        background-color: #b9c9d8;
        overflow: hidden;
        position: relative;
    }
    #start-overlay {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.5);
        z-index: 10;
        border-radius: 12px;
    }
    #start-btn {
        padding: 16px 48px;
        font-size: 22px;
        font-weight: bold;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
    }
    #start-btn:hover { background: #45a049; }
</style>
</head>

<body>

<div class="wrapper">
    <div class="card">
        <div class="top-section">
            <div class="left">
                <h2>Brodie String</h2>
                <div class="buttons">
                    <button class="btn"><img src="icon/Pause.png" class="pause-icon" alt="pause"> Pause</button>
                    <button class="btn"><img src="icon/Reset.png" class="reset-icon" alt="reset"> Reset</button>
                </div>
            </div>
            <div class="right">
                <div class="user">Welcome, userxxx</div>
                <div class="score">Score : 0</div>
            </div>
        </div>

        <!-- Game Area -->
        <div class="game-area">
            <div id="start-overlay">
                <button id="start-btn">&#9654; Start Game</button>
            </div>
            <img id="webcam-feed" alt="Webcam Feed">
        </div>

        <div class="instructions">
            <ul>
                <li>Focus on one bead at a time.</li>
                <li>Maintain focus until the image appears clear</li>
                <li>Practice for 3-5 minutes daily for best results</li>
            </ul>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
<script>
    const socket = io();
    let gameStarted = false;

    socket.on("score_update", function(data) {
        document.querySelector(".score").textContent = "Score : " + data.score;
    });

    socket.on("game_over", function(data) {
        if (gameStarted) {
            window.location.href = "result_brodie_strings.html?score=" + data.score;
        }
    });

    document.getElementById("start-btn").addEventListener("click", function() {
        document.getElementById("start-overlay").style.display = "none";
        gameStarted = true;
        document.querySelector(".score").textContent = "Score : 0";
        socket.emit("start_brodie");
        setTimeout(function() {
            document.getElementById("webcam-feed").src = "/video_feed/brodie?" + Date.now();
        }, 300);
    });
</script>

</body>
</html>
