<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Focus Point - Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">
            <img src="icon/logo.png" class="logo-icon">
        </div>

        <nav>
            <a class="active" href="#">Home</a>
            <a href="#">About Us</a>
            <a href="#">How to use</a>
        </nav>

        <div class="auth">
            <button class="btn-signin">Sign In</button>
            <a href="#">Register</a>
        </div>
    </header>

    <!-- Main Content -->
    <section class="container">

        <!-- Left -->
        <div class="left">
            <h1>Sign In to<br>get your nutrients</h1>
            <p>If you don't have an account.<br>
                You can <span class="register-link">Register here !</span>
            </p>

            <div class="image-wrapper">
                <img src="icon/gambarprofile.png" class="profile-icon">
            </div>
        </div>

        <!-- Right -->
        <div class="right">
            <h2>Welcome Back</h2>

            <form class="form">

                <div class="input-box">
                    <input type="email" placeholder="Enter Email">
                    <img src="icon/icon_x.png" class="x-icon">
                </div>

                <div class="input-box">
                    <input type="password" placeholder="••••••••">
                    <img src="icon/icon_password.png" class="password-icon">
                </div>

                <p class="forgot-password">Recover Password ?</p>

                <button class="submit-btn">Sign In</button>

                <div class="divider">Or continue with</div>
            </form>

            <div class="social-login">
                <button><img src="icon/icon_google.png"></button>
                <button><img src="icon/icon_apple.png"></button>
                <button><img src="icon/icon_facebook.png"></button>
            </div>

        </div>

    </section>

</body>
</html>
