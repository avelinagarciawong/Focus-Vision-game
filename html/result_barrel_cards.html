<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Result</title>
<link rel="stylesheet" href="css/result.css">
</head>

<body>

<div class="wrapper">

    <!-- BACK -->
    <div class="back">
        <a href="dashboard.html" class="back-link">
            <img src="icon/Icon_Back.png" class="back-icon" alt="back">
            Back to Games
        </a>
    </div>

    <!-- GAME INFO -->
    <div class="card game-info">

        <div class="icon-box">
            <img src="icon/Icon_BarrelCards.png" class="game-icon">
        </div>

        <div class="game-text">
            <h3>Barrel Cards</h3>
            <p>Focus on barrel shapes to improve eye convergence, divergence, and binocular coordination.</p>
        </div>

    </div>

    <!-- STATS -->
    <div class="stats-container">

        <!-- Difficulty -->
        <div class="card stat-box">
            <h4>Difficulty</h4>

            <div class="levels">
                <span class="level active">Level 1</span>
                <span class="level">Level 2</span>
                <span class="level">Level 3</span>
                <span class="level">Level 4</span>
                <span class="level">Level 5</span>
            </div>
        </div>

        <!-- Score -->
        <div class="card stat-box center">
            <h4>Score</h4>
            <div class="big">21</div>
        </div>

        <!-- Time -->
        <div class="card stat-box center">
            <h4>Time</h4>
            <div class="big">0:50</div>
        </div>

    </div>

    <!-- RESULT -->
    <div class="card result-box">

        <h2>Game Completed!</h2>
        <p class="subtitle">Congratulations!<br>You have completed Barrel Cards.</p>

        <div class="actions">
            <a href="play_barrel_cards.html" class="btn primary">Next Level</a>
            <a href="play_barrel_cards.html" class="btn outline">Restart</a>
        </div>

    </div>

</div>

</body>
</html>
