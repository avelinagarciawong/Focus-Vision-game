<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Focus Point - Register</title>
    <link rel="stylesheet" href="css/register.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">
            <img src="icon/logo.png" class="logo-icon">
        </div>

        <nav>
            <a class="active" href="#">Home</a>
            <a href="#">About Us</a>
            <a href="#">How to use</a>
        </nav>

        <div class="auth">
            <a href="#">Sign In</a>
            <button class="btn-register">Register</button>
        </div>
    </header>

    <!-- Main Content -->
    <section class="container">

        <!-- Left -->
        <div class="left">
            <h1>Create an account<br>to get started.</h1>
            <p>Already have an account? <span class="login-link">Log in here.</span></p>

            <div class="image-wrapper">
                <img src="icon/gambarprofile.png" class="profile-icon">
            </div>
        </div>

        <!-- Right -->
        <div class="right">
            <h2>Hello</h2>

            <form class="form">
                <div class="input-box">
                    <input type="text" placeholder="Enter Username">
                    <img src="icon/icon_x.png" class="x-icon">
                </div>

                <div class="input-box">
                    <input type="email" placeholder="Enter Email">
                    <img src="icon/icon_x.png" class="x-icon">
                </div>

                <div class="input-box">
                    <input type="password" placeholder="••••••••">
                    <img src="icon/icon_password.png" class="password-icon">
                </div>

                <button class="submit-btn">Register</button>
            </form>
        </div>

    </section>

</body>
</html>
