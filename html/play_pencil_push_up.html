<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pencil Push Up</title>
<link rel="stylesheet" href="css/playgame.css">
</head>

<body>

<div class="wrapper">

    <div class="card">

        <!-- Header -->
        <div class="top-section">

            <div class="left">
                <h2>Pencil Push Up</h2>

                <div class="buttons">
                    <button class="btn"><img src="icon/Pause.png" class="pause-icon" alt="pause"> Pause</button>
                    <button class="btn"><img src="icon/Reset.png" class="reset-icon" alt="reset"> Reset</button>
                </div>
            </div>

            <div class="right">
                <div class="user">Welcome, userxxx</div>
                <div class="score">Score : 5</div>
            </div>

        </div>

        <!-- Game Area -->
        <div class="game-area"></div>

        <!-- Instructions -->
        <div class="instructions">
            <ul>
                <li>Follow the red circles with your eyes only.</li>
                <li>Keep your head still and maintain good posture.</li>
                <li>Practice for 3-5 minutes daily for best results.</li>
            </ul>
        </div>

    </div>

</div>

</body>
</html>
